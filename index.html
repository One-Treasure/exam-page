<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>一级题库模拟考试</title>
<style>
:root {
  --bg: #f7f8fb;
  --panel: #ffffff;
  --text: #17202a;
  --muted: #667085;
  --line: #d9dee8;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --green: #13795b;
  --red: #b42318;
  --amber: #9a6700;
  --soft-blue: #eef4ff;
  --soft-green: #ecfdf3;
  --soft-red: #fef3f2;
  --soft-amber: #fffaeb;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
}
.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,.96);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(8px);
}
.header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 14px 20px;
  display: grid;
  grid-template-columns: minmax(220px, 1fr) auto;
  gap: 14px;
  align-items: center;
}
h1 { margin: 0; font-size: 22px; line-height: 1.25; letter-spacing: 0; }
.subline { color: var(--muted); font-size: 13px; margin-top: 4px; }
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; align-items: center; }
.toolbar[hidden], [hidden] { display: none !important; }
button {
  border: 1px solid var(--primary);
  background: var(--primary);
  color: white;
  border-radius: 6px;
  padding: 9px 14px;
  font-size: 14px;
  cursor: pointer;
}
button:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
button.secondary { background: white; color: var(--primary); }
button.secondary:hover { background: var(--soft-blue); }
button:disabled { opacity: .55; cursor: not-allowed; }
main { max-width: 1180px; margin: 0 auto; padding: 20px; }
.home-menu { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(220px, 1fr)); margin-top: 12px; }
.menu-card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 20px; text-align: left; color: var(--text); cursor: pointer; min-height: 128px; }
.menu-card:hover { border-color: var(--primary); background: var(--soft-blue); }
.menu-card h2 { margin: 0 0 8px; font-size: 22px; letter-spacing: 0; }
.menu-card p { margin: 0; color: var(--muted); line-height: 1.6; }
.mode-panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }
.mode-panel strong { font-size: 16px; }
.mode-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.stats { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
.stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; min-height: 72px; }
.stat b { display: block; font-size: 24px; margin-top: 4px; }
.stat span { color: var(--muted); font-size: 13px; }
.progress-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
.progress-label { display: flex; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
.progress-bar { height: 10px; background: #eceff5; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; width: 0; background: var(--primary); transition: width .2s ease; }
.question-list { display: grid; gap: 18px; }
.type-section { display: grid; gap: 12px; }
.type-heading { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; padding: 8px 2px 0; border-top: 1px solid var(--line); }
.type-heading h2 { margin: 0; font-size: 18px; line-height: 1.3; letter-spacing: 0; }
.type-heading span { color: var(--muted); font-size: 13px; white-space: nowrap; }
.question { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
.question { scroll-margin-top: 132px; }
.question.correct { border-color: #84d6b0; background: var(--soft-green); }
.question.wrong { border-color: #f0a39c; background: var(--soft-red); }
.question.manual { border-color: #f2cd75; background: var(--soft-amber); }
.q-meta { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 10px; }
.badge { display: inline-flex; align-items: center; min-height: 24px; padding: 3px 8px; border-radius: 999px; background: var(--soft-blue); color: #1849a9; font-size: 13px; }
.q-num { color: var(--muted); font-size: 13px; white-space: nowrap; }
.prompt { font-size: 16px; line-height: 1.65; white-space: pre-wrap; overflow-wrap: anywhere; margin-bottom: 12px; }
.options { display: grid; gap: 8px; }
.option { display: grid; grid-template-columns: 22px 1fr; gap: 8px; align-items: start; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; background: white; line-height: 1.5; }
.option input { margin-top: 4px; }
.option-key { font-weight: 700; margin-right: 6px; color: var(--muted); }
.text-answer { width: 100%; min-height: 74px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 10px; font: inherit; line-height: 1.55; background: white; }
.answer-actions { display: flex; justify-content: flex-end; margin-top: 12px; }
.answer-actions button { min-width: 96px; }
.feedback { margin-top: 12px; padding: 10px; border-radius: 6px; border: 1px solid var(--line); background: white; line-height: 1.6; white-space: pre-wrap; overflow-wrap: anywhere; }
.feedback strong { display: inline-block; margin-right: 6px; }
.ok { color: var(--green); } .bad { color: var(--red); } .manual-text { color: var(--amber); }
.empty { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 24px; color: var(--muted); text-align: center; }
.modal-backdrop { position: fixed; inset: 0; z-index: 50; background: rgba(15,23,42,.42); padding: 18px; display: grid; place-items: center; }
.status-modal { width: min(920px, 100%); max-height: min(760px, calc(100vh - 36px)); overflow: auto; background: var(--panel); border-radius: 8px; border: 1px solid var(--line); box-shadow: 0 20px 60px rgba(15,23,42,.24); }
.modal-head { position: sticky; top: 0; background: var(--panel); border-bottom: 1px solid var(--line); padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.modal-head h2 { margin: 0; font-size: 18px; letter-spacing: 0; }
.modal-body { padding: 14px 16px 18px; display: grid; gap: 14px; }
.status-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; color: var(--muted); font-size: 13px; }
.legend-dot { display: inline-block; width: 12px; height: 12px; border-radius: 999px; border: 1px solid var(--line); margin-right: 5px; vertical-align: -1px; }
.legend-dot.correct { background: var(--soft-green); border-color: #84d6b0; }
.legend-dot.wrong { background: var(--soft-red); border-color: #f0a39c; }
.legend-dot.blank { background: #fff; }
.status-section { display: grid; gap: 8px; }
.status-section h3 { margin: 0; font-size: 15px; letter-spacing: 0; }
.status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr)); gap: 8px; }
.status-num { border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 6px; padding: 7px 0; min-width: 0; text-align: center; font-size: 13px; }
.status-num.correct { background: var(--soft-green); border-color: #84d6b0; color: var(--green); }
.status-num.wrong { background: var(--soft-red); border-color: #f0a39c; color: var(--red); }
.status-num.manual { background: var(--soft-amber); border-color: #f2cd75; color: var(--amber); }
@media (max-width: 760px) {
  .header-inner { grid-template-columns: 1fr; }
  .toolbar { justify-content: flex-start; }
  .home-menu { grid-template-columns: 1fr; }
  .stats { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
  main { padding: 14px; }
}
@media (max-width: 460px) {
  .stats { grid-template-columns: 1fr; }
  h1 { font-size: 20px; }
  button { width: 100%; }
}
</style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div>
      <h1>一级题库模拟考试</h1>
      <div class="subline" id="summaryLine"></div>
    </div>
    <div class="toolbar" id="mainToolbar" hidden>
      <button type="button" id="homeBtn" class="secondary">返回首页</button>
      <button type="button" id="statusBtn" class="secondary">查看答题情况</button>
      <button type="button" id="restartBtn">重新开始</button>
      <button type="button" id="submitBtn" class="secondary">全部确定</button>
    </div>
  </div>
</header>
<main>
  <section id="homeView">
    <div class="home-menu">
      <button type="button" class="menu-card" id="practiceMenu">
        <h2>题库练习</h2>
        <p>按题型分开练习，可选择保持原题库顺序，也可以打乱顺序。</p>
      </button>
      <button type="button" class="menu-card" id="examMenu">
        <h2>模拟考试</h2>
        <p>按题库比例随机抽取 100 题，按题型分区展示，适合正式自测。</p>
      </button>
    </div>
  </section>
  <section id="practiceSetup" class="mode-panel" hidden>
    <strong>题库练习</strong>
    <div class="mode-actions">
      <button type="button" id="practiceOrderedBtn">保持顺序</button>
      <button type="button" id="practiceRandomBtn" class="secondary">打乱顺序</button>
    </div>
  </section>
  <section class="stats" id="stats" hidden></section>
  <section class="progress-wrap" id="progressPanel" hidden>
    <div class="progress-label"><span id="progressText">已答 0 / 0</span><span id="scoreText">未交卷</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </section>
  <section class="question-list" id="questionList"></section>
</main>
<div class="modal-backdrop" id="statusModal" hidden>
  <section class="status-modal" role="dialog" aria-modal="true" aria-labelledby="statusTitle">
    <div class="modal-head">
      <h2 id="statusTitle">答题情况</h2>
      <button type="button" id="closeStatusBtn" class="secondary">关闭</button>
    </div>
    <div class="modal-body" id="statusBody"></div>
  </section>
</div>

const TYPE_ORDER = ['blank','single','multi','judge','term','short'];

function shuffle(list) {
  const arr = [...list];
  const rand = new Uint32Array(1);
  for (let i = arr.length - 1; i > 0; i--) {
    crypto.getRandomValues(rand);
    const j = rand[0] % (i + 1);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function normalizeObjective(value) {
  if (Array.isArray(value)) return value.map(String).sort().join('');
  return String(value ?? '').replace(/\s+/g, '').toUpperCase();
}
function isAutoGraded(q) { return ['blank','single','multi','judge'].includes(q.type); }
function expectedAnswer(q) { return q.type === 'blank' ? String(q.reference ?? '') : q.answer; }
function isCorrect(q) { return q.type === 'blank' ? String(getAnswer(q.id) ?? '') === expectedAnswer(q) : normalizeObjective(getAnswer(q.id)) === normalizeObjective(q.answer); }
function getAnswer(id) { return answers.get(id); }
function isConfirmed(q) { return submitted || confirmed.has(q.id); }
function isAnswered(q) {

  if (Array.isArray(value)) return value.length > 0;

}
function objectiveTotal() { return questions.filter(isAutoGraded).length; }
function manualTotal() { return questions.length - objectiveTotal(); }
function renderStats() {
  const counts = Object.fromEntries(TYPE_ORDER.map(t => [t, 0]));
  questions.forEach(q => counts[q.type]++);
  const modeName = currentMode === 'practice' ? '题库练习' : '模拟考试';

function renderProgress() {

function optionMarkup(q) {
  const value = getAnswer(q.id);
  const locked = isConfirmed(q);
  if (q.type === 'single' || q.type === 'judge') {
    return `<div class="options">${q.options.map(opt => `<label class="option"><input type="radio" name="q-${q.id}" value="${escapeHtml(opt.key)}" ${value === opt.key ? 'checked' : ''} ${locked ? 'disabled' : ''}><span><span class="option-key">${escapeHtml(opt.key)}</span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
  }
  if (q.type === 'multi') {
    const selected = Array.isArray(value) ? value : [];
    return `<div class="options">${q.options.map(opt => `<label class="option"><input type="checkbox" name="q-${q.id}" value="${escapeHtml(opt.key)}" ${selected.includes(opt.key) ? 'checked' : ''} ${locked ? 'disabled' : ''}><span><span class="option-key">${escapeHtml(opt.key)}</span>${escapeHtml(opt.text)}</span></label>`).join('')}</div>`;
  }

}
function answerActionMarkup(q) {

  return `<div class="answer-actions"><button type="button" class="confirm-answer secondary" data-id="${q.id}">确定答案</button></div>`;
}
function feedbackMarkup(q) {
  if (!isConfirmed(q)) return '';
  const user = getAnswer(q.id);
  if (isAutoGraded(q)) {
    const right = isCorrect(q);
    const mine = Array.isArray(user) ? user.sort().join('') : (user || '未作答');
    return `<div class="feedback"><strong class="${right ? 'ok' : 'bad'}">${right ? '回答正确' : '需要回顾'}</strong>你的答案：${escapeHtml(mine)}
正确答案：${escapeHtml(expectedAnswer(q))}</div>`;
  }
  return `<div class="feedback"><strong class="manual-text">参考答案</strong>${escapeHtml(q.reference || q.answer)}</div>`;
}
function questionClass(q) {
  if (!isConfirmed(q)) return 'question';

function statusClass(q) {
  if (!isAnswered(q)) return 'blank';

}
function renderQuestions() {

    const group = questions.filter(q => q.type === type);
    if (!group.length) return '';
    const items = group.map((q, idx) => {
      globalIndex += 1;
      return `
    <article class="${questionClass(q)}" id="question-${q.id}" data-id="${q.id}">
      <div class="q-meta"><span class="badge">${escapeHtml(TYPE_NAMES[q.type])}</span><span class="q-num">本类第 ${idx + 1} 题 / 总第 ${globalIndex} 题</span></div>
      <div class="prompt">${escapeHtml(q.prompt)}</div>

      ${answerActionMarkup(q)}
      ${feedbackMarkup(q)}
    </article>`;
    }).join('');
    return `<section class="type-section"><div class="type-heading"><h2>${escapeHtml(TYPE_NAMES[type])}</h2><span>${group.length} 题，本类内随机</span></div>${items}</section>`;
  }).join('');
  bindInputs();
  renderProgress();
}
function renderStatusModal() {
  const answered = questions.filter(isAnswered).length;
  const confirmedCount = questions.filter(isConfirmed).length;

  const wrongCount = questions.filter(q => isConfirmed(q) && isAutoGraded(q) && !isCorrect(q)).length;

      <span>已确定 ${confirmedCount} / ${questions.length}</span>

    ${groups}`;
  document.querySelectorAll('.status-num').forEach(btn => btn.addEventListener('click', event => {

  const correct = checkedObjective.filter(isCorrect).length;
  const checkedManual = questions.filter(q => isConfirmed(q) && !isAutoGraded(q)).length;
  document.getElementById('scoreText').textContent = `已确定：客观题 ${correct} / ${checkedObjective.length}，待自评 ${checkedManual} 题`;
}
function showHome() {
  closeStatusModal();
  currentMode = 'home';
  questions = [];
  submitted = false;
  answers.clear();
  confirmed.clear();
  document.getElementById('homeView').hidden = false;
  document.getElementById('practiceSetup').hidden = true;
  document.getElementById('mainToolbar').hidden = true;
  document.getElementById('stats').hidden = true;
  document.getElementById('progressPanel').hidden = true;
  document.getElementById('questionList').innerHTML = '';
  document.getElementById('summaryLine').textContent = `共 ${BANK.length} 题，选择一个模式开始`;
  window.scrollTo({top:0, behavior:'smooth'});
}
function showPracticeMenu() {
  closeStatusModal();
  currentMode = 'practice';
  document.getElementById('homeView').hidden = true;
  document.getElementById('practiceSetup').hidden = false;
  document.getElementById('mainToolbar').hidden = true;
  document.getElementById('stats').hidden = true;
  document.getElementById('progressPanel').hidden = true;
  document.getElementById('questionList').innerHTML = '';
  document.getElementById('summaryLine').textContent = '题库练习：选择保持顺序或打乱顺序';
  window.scrollTo({top:0, behavior:'smooth'});
}
function buildQuestionSet(mode, order) {
  if (mode === 'exam') {
    return TYPE_ORDER.flatMap(type => shuffle(BANK.filter(q => q.type === type)).slice(0, EXAM_COUNTS[type] ?? 0));
  }
  if (mode === 'practice' && order === 'ordered') {
    return TYPE_ORDER.flatMap(type => BANK.filter(q => q.type === type));
  }
  return TYPE_ORDER.flatMap(type => shuffle(BANK.filter(q => q.type === type)));
}
function startMode(mode, order = 'random') {
  closeStatusModal();
  currentMode = mode;
  currentOrder = order;
  submitted = false;
  answers.clear();
  confirmed.clear();
  questions = buildQuestionSet(mode, order).map((q, idx) => ({...q, id: idx + 1}));
  document.getElementById('homeView').hidden = true;
  document.getElementById('practiceSetup').hidden = true;
  document.getElementById('mainToolbar').hidden = false;
  document.getElementById('stats').hidden = false;
  document.getElementById('progressPanel').hidden = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('scoreText').textContent = '可逐题确定';
  renderStats();
  renderQuestions();
  window.scrollTo({top:0, behavior:'smooth'});
}
function restart() {
  startMode(currentMode === 'home' ? 'exam' : currentMode, currentOrder);
}
function submitExam() {
  submitted = true;
  questions.forEach(q => confirmed.add(q.id));
  let correct = 0;
  questions.forEach(q => {
    if (isAutoGraded(q) && isCorrect(q)) correct++;
  });
  document.getElementById('scoreText').textContent = `客观题 ${correct} / ${objectiveTotal()}，待自评 ${manualTotal()} 题`;
  document.getElementById('submitBtn').disabled = true;
  renderQuestions();
  window.scrollTo({top:0, behavior:'smooth'});
}
document.getElementById('homeBtn').addEventListener('click', showHome);
document.getElementById('statusBtn').addEventListener('click', openStatusModal);
document.getElementById('closeStatusBtn').addEventListener('click', closeStatusModal);
document.getElementById('statusModal').addEventListener('click', event => {
  if (event.target.id === 'statusModal') closeStatusModal();
});
document.getElementById('practiceMenu').addEventListener('click', showPracticeMenu);
document.getElementById('examMenu').addEventListener('click', () => startMode('exam', 'random'));
document.getElementById('practiceOrderedBtn').addEventListener('click', () => startMode('practice', 'ordered'));
document.getElementById('practiceRandomBtn').addEventListener('click', () => startMode('practice', 'random'));
document.getElementById('restartBtn').addEventListener('click', restart);
document.getElementById('submitBtn').addEventListener('click', submitExam);
showHome();
</script>
</body>
</html>
